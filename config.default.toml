# voicerouter default configuration
# Copy to ~/.config/voicerouter/config.toml and edit as needed.

[hotkey]
# evdev key name to trigger recording.
key = "KEY_RIGHTALT"
# Activation mode: "ptt", "toggle", or "auto"
mode = "auto"
# Seconds of hold before long-press activates in auto mode.
hold_delay = 0.3

[audio]
sample_rate = 16000
channels = 1
silence_threshold = 0.01
# Silence duration (seconds) before auto-stopping (wakeword mode only).
silence_duration = 1.5
# Hard timeout for hotkey recordings (seconds). Wakeword ignores this.
max_record_seconds = 60
denoise = true

[asr]
# Model identifier: "paraformer-zh", "funasr-nano", "whisper-tiny-en", "whisper-base-en"
model = "paraformer-zh"
model_dir = "~/.cache/voicerouter/models"

[asr.cloud]
enabled = false                # enable cloud ASR (DashScope Qwen3-ASR-Flash-Realtime)
endpoint = "wss://dashscope.aliyuncs.com/api-ws/v1/realtime"
model = "qwen3-asr-flash-realtime"
api_key_env = "DASHSCOPE_API_KEY"     # env var holding the API key
language = "zh"                       # language hint (zh, en, ja, etc.)
# Cloud ASR is tried first; falls back to local on failure.
# Punctuation from cloud ASR is preserved; local ct-punc is skipped.

[postprocess]
# "strip_trailing", "keep", or "replace_space"
punct_mode = "strip_trailing"
fullwidth_punct = true
fix_english = true
remove_fillers = true
normalize_spoken = true
# ct-transformer punctuation restoration
restore_punctuation = true
punctuation_model = "~/.cache/voicerouter/models/ct-punc"

[inject]
# "auto", "clipboard_paste", "wtype", "xdotool"
method = "auto"

[sound]
feedback = true

[tts]
enabled = false
engine = "sherpa-onnx"
model = "kokoro-tts"
model_dir = "~/.cache/voicerouter/models"
speed = 1.2
sid = 3               # zf_001 — Chinese female voice
mute_mic_during_playback = true

[wakeword]
enabled = false
phrases = ["小助手"]
window_seconds = 2.0
stride_seconds = 1.0
# "start_recording" or "pipeline_passthrough"
action = "start_recording"

[continuous]
# Always-on listening with VAD + intent classification.
enabled = false
# Speaker verification is planned for a future release.
# speaker_verify = false
# speaker_threshold = 0.6
# speaker_model = "3dspeaker"
vad_model = "silero"

[continuous.llm]
# OpenAI-compatible endpoint for intent classification of ambiguous speech.
endpoint = ""
model = "claude-haiku"
api_key_env = "VOICEROUTER_LLM_KEY"

[ipc]
enabled = true
socket_path = ""      # default: $XDG_RUNTIME_DIR/voicerouter.sock
max_connections = 8

# Pipeline stages (replaces legacy [router]).
# Uncomment and customize as needed.
#
# [[pipeline.stages]]
# name = "echo"
# handler = "speak"
# condition = "starts_with:echo "
#
# [[pipeline.stages]]
# name = "search"
# handler = "shell"
# command = "google-chrome 'https://www.google.com/search?q={text}'"
# condition = "starts_with:搜索"
#
# [[pipeline.stages]]
# name = "default"
# handler = "inject"
#

# ── Conversation Mode ────────────────────────────────────────────────
# Multi-turn voice conversation with LLM. Mutually exclusive with [continuous].
[conversation]
enabled = false
timeout_seconds = 30          # inactivity timeout (from last turn)
max_turn_seconds = 30         # max recording duration per turn
end_phrases = ["结束", "再见", "没事了"]
confidence_high = 0.8
confidence_low = 0.5
low_confidence_prefix = "我不太确定，"
low_confidence_reject = "抱歉，我无法回答这个问题"
llm_timeout_seconds = 15

[conversation.llm]
endpoint = "http://localhost:11434/v1"
model = "qwen3.5:4b"
system_prompt = "你是一个简洁的语音助手。用口语化的中文回答，保持简短。必须以JSON格式回复，包含reply(回答文本)和confidence(0-1置信度)两个字段。"
